<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<title>AI API TECH T0.1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Sarabun:wght@300;400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --orange: #ff6a00;
  --orange2: #ff9f45;
  --orange-glow: rgba(255,106,0,0.3);
  --dark: #080808;
  --dark2: #111111;
  --card: #141414;
  --card2: #1c1c1c;
  --border: rgba(255,106,0,0.2);
  --border-bright: rgba(255,106,0,0.6);
  --text: #f0f0f0;
  --text-dim: #888;
  --text-dimmer: #444;
  --green: #00ff88;
  --blue: #00aaff;
  --font-head: 'Rajdhani', sans-serif;
  --font-body: 'Sarabun', sans-serif;
  --font-mono: 'Share Tech Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--dark);
  color: var(--text);
  font-family: var(--font-body);
  overflow: hidden;
}

#bg-canvas {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none;
  width: 100% !important; height: 100% !important;
}

.grid-overlay {
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(255,106,0,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,106,0,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

.vignette {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.85) 100%);
  pointer-events: none;
}

#app {
  position: relative; z-index: 1;
  height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr auto;
  overflow: hidden;
}

header {
  background: rgba(8,8,8,0.95);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  backdrop-filter: blur(20px);
  position: relative;
  overflow: visible; 
  flex-shrink: 0;
}

header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--orange), transparent);
  animation: scanline 4s ease-in-out infinite;
}

@keyframes scanline {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}

.header-left {
  display: flex;
  align-items: center;
  gap: 14px;
  flex: 1;
  min-width: 0;
}

.logo-img {
  height: 80px;
  width: auto;
  filter: drop-shadow(0 0 8px var(--orange));
  flex-shrink: 0;
}

.header-title {
  font-family: var(--font-head);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--text);
  white-space: nowrap;
}

.header-title span { color: var(--orange); }

.user-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--blue);
  background: rgba(0,170,255,0.08);
  border: 1px solid rgba(0,170,255,0.25);
  padding: 3px 8px;
  border-radius: 3px;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 5px;
  cursor: default;
  position: relative;
  white-space: nowrap;
  flex-shrink: 0;
}

.user-badge:hover::after {
  content: attr(data-fullid);
  position: absolute;
  top: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--card2);
  border: 1px solid var(--border);
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 9px;
  color: var(--text-dim);
  white-space: nowrap;
  z-index: 200;
}

.status-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--green);
  background: rgba(0,255,136,0.08);
  border: 1px solid rgba(0,255,136,0.25);
  padding: 3px 8px;
  border-radius: 3px;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
  flex-shrink: 0;
}

.status-dot {
  width: 6px; height: 6px;
  background: var(--green);
  border-radius: 50%;
  animation: pulse-green 2s ease-in-out infinite;
  flex-shrink: 0;
}

@keyframes pulse-green {
  0%, 100% { opacity: 1; box-shadow: 0 0 4px var(--green); }
  50% { opacity: 0.4; box-shadow: none; }
}

.header-right {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}

.icon-btn {
  width: 34px; height: 34px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-dim);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 30px;
  transition: all 0.2s;
}

.icon-btn:hover {
  border-color: var(--orange);
  color: var(--orange);
  background: var(--orange-glow);
}

#chat {
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 0;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}

#chat::-webkit-scrollbar { width: 4px; }
#chat::-webkit-scrollbar-track { background: transparent; }
#chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
#chat::-webkit-scrollbar-thumb:hover { background: var(--orange); }

#welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  text-align: center;
  animation: fadeUp 0.6s ease both;
}

.welcome-logo-wrap { position: relative; margin-bottom: 50px; }

.welcome-logo {
  height: 100px;
  filter: drop-shadow(0 0 20px var(--orange));
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.welcome-ring {
  position: absolute;
  inset: -16px;
  border-radius: 50%;
  border: 1px solid var(--border);
  animation: spin 8s linear infinite;
}

.welcome-ring::before {
  content: '';
  position: absolute;
  top: -2px; left: 50%;
  width: 4px; height: 4px;
  background: var(--orange);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--orange);
  transform: translateX(-50%);
}

@keyframes spin { to { transform: rotate(360deg); } }

.welcome-title {
  font-family: var(--font-head);
  font-size: 30px;
  font-weight: 700;
  letter-spacing: 4px;
  margin-bottom: 8px;
}

.welcome-title span { color: var(--orange); }

.welcome-sub {
  font-size: 14px;
  color: var(--text-dim);
  letter-spacing: 1px;
  margin-bottom: 32px;
}

.quick-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 8px;
  width: 100%;
  max-width: 800px;
}

.quick-btn {
  background: var(--card);
  border: 1px solid rgba(255,106,0,0.4);
  color: #e8e8e8;
  padding: 12px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 500;
  text-align: left;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 10px;
  line-height: 1.4;
  letter-spacing: 0.3px;
  text-shadow: 0 0 12px rgba(255,255,255,0.15);
}

.quick-btn:hover {
  border-color: var(--orange);
  color: #ffffff;
  background: rgba(255,106,0,0.12);
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(255,106,0,0.2);
  text-shadow: 0 0 16px rgba(255,200,100,0.4);
}

.quick-btn .qicon {
  font-size: 18px;
  flex-shrink: 0;
  filter: drop-shadow(0 0 4px rgba(255,106,0,0.5));
}

.msg-wrap {
  display: flex;
  flex-direction: column;
  margin-bottom: 16px;
  animation: fadeUp 0.3s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg-wrap.user { align-items: flex-end; }
.msg-wrap.bot  { align-items: flex-start; }

.msg-meta {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-dimmer);
  margin-bottom: 5px;
  letter-spacing: 0.5px;
  padding: 0 4px;
}

.msg-wrap.user .msg-meta { color: rgba(255,106,0,0.4); }

.message {
  max-width: 72%;
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 14px;
  line-height: 1.7;
  white-space: pre-wrap;
  word-break: break-word;
}

.msg-wrap.user .message {
  background: linear-gradient(135deg, var(--orange), #ff4500);
  color: #000;
  font-weight: 500;
  border-bottom-right-radius: 3px;
  box-shadow: 0 4px 20px rgba(255,106,0,0.25);
  position: relative;
  z-index: 2; /* ทำให้แชทไม่ไปทับ panel */
}

.msg-wrap.bot .message {
  background: var(--card);
  border: 1px solid var(--border);
  border-bottom-left-radius: 3px;
  font-family: var(--font-mono);
  font-size: 13px;
  color: #e0e0e0;
}

.msg-wrap.bot .message::before {
  content: '> ';
  color: var(--orange);
  font-weight: bold;
}

.loading-wrap {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 16px;
}

.loading-bubble {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  border-bottom-left-radius: 3px;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.loading-dot {
  width: 6px; height: 6px;
  background: var(--orange);
  border-radius: 50%;
  animation: blink 1.2s ease-in-out infinite;
}
.loading-dot:nth-child(2) { animation-delay: 0.2s; }
.loading-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}

.input-area {
  background: rgba(8,8,8,0.95);
  border-top: 1px solid var(--border);
  padding: 14px 20px;
  backdrop-filter: blur(20px);
  position: relative;
  z-index: 10;
}

.input-area::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--orange), transparent);
  opacity: 0.4;
}

.input-inner {
  display: flex;
  gap: 10px;
  align-items: center;
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 6px 6px 6px 16px;
  transition: border-color 0.2s;
  max-width: 900px;
  margin: 0 auto;
}

.input-inner:focus-within {
  border-color: var(--border-bright);
  box-shadow: 0 0 0 3px rgba(255,106,0,0.08);
}

.input-prefix {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--orange);
  flex-shrink: 0;
  user-select: none;
}

#messageInput {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  caret-color: var(--orange);
  min-width: 0;
}

#messageInput::placeholder { color: var(--text-dimmer); }

.send-btn {
  background: var(--orange);
  border: none;
  color: #000;
  font-family: var(--font-head);
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 2px;
  padding: 9px 20px;
  border-radius: 7px;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
}

.send-btn:hover {
  background: var(--orange2);
  box-shadow: 0 0 16px rgba(255,106,0,0.4);
  transform: translateY(-1px);
}

.send-btn:active { transform: translateY(0); }

.corner-tl, .corner-tr, .corner-bl, .corner-br {
  position: fixed;
  width: 20px; height: 20px;
  z-index: 100;
  pointer-events: none;
}

.corner-tl { top: 68px; left: 4px; border-top: 1px solid var(--orange); border-left: 1px solid var(--orange); }
.corner-tr { top: 68px; right: 4px; border-top: 1px solid var(--orange); border-right: 1px solid var(--orange); }
.corner-bl { bottom: 72px; left: 4px; border-bottom: 1px solid var(--orange); border-left: 1px solid var(--orange); }
.corner-br { bottom: 72px; right: 4px; border-bottom: 1px solid var(--orange); border-right: 1px solid var(--orange); }

.copy-btn {
  display: inline-block;
  margin-top: 6px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-dimmer);
  background: transparent;
  border: 1px solid var(--text-dimmer);
  padding: 2px 8px;
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.2s;
}
.copy-btn:hover { color: var(--orange); border-color: var(--orange); }

.char-count {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-dimmer);
  flex-shrink: 0;
  min-width: 28px;
  text-align: right;
}

/* ── HISTORY PANEL ── */
.history-btn {
  width: 34px; height: 34px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-dim);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  transition: all 0.2s;
  position: relative;
}
.history-btn:hover { border-color: var(--orange); color: var(--orange); background: var(--orange-glow); }

.history-badge {
  position: absolute; top: -4px; right: -4px;
  width: 14px; height: 14px;
  background: var(--orange); border-radius: 50%;
  font-size: 9px; font-family: var(--font-mono);
  color: #000; display: flex; align-items: center; justify-content: center;
  font-weight: bold;
}

/* ย้ายมาควบคุม z-index นอก header จะแสดงทับทุกอย่างได้ */
.history-panel {
  position: fixed;
  top: 64px;
  right: 8px;
  z-index: 99999; /* เพิ่มค่าให้สูงมากๆ */
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 10px;
  width: 320px;
  max-height: 360px;
  overflow-y: auto;
  display: none;
  animation: fadeUp 0.2s ease;
  box-shadow: 0 8px 32px rgba(0,0,0,0.8); /* เพิ่มเงาให้ดูมีมิติซ้อนทับชัดเจน */
}
.history-panel.open { display: block; }

.history-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px 8px;
  border-bottom: 1px solid var(--border);
  font-family: var(--font-mono); font-size: 11px; color: var(--text-dim);
  letter-spacing: 1px;
}

.history-session-info {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--blue);
  padding: 4px 14px 8px;
  opacity: 0.7;
  letter-spacing: 0.5px;
}

.history-clear {
  background: none; border: none; color: var(--text-dimmer);
  cursor: pointer; font-size: 10px; font-family: var(--font-mono);
  transition: color 0.2s;
}
.history-clear:hover { color: var(--orange); }

.history-item {
  padding: 9px 14px; cursor: pointer;
  border-bottom: 1px solid rgba(255,106,0,0.06);
  font-family: var(--font-body); font-size: 13px; color: var(--text-dim);
  transition: all 0.15s; display: flex; align-items: center; gap: 8px;
}
.history-item:hover { background: rgba(255,106,0,0.07); color: var(--text); }
.history-item span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.history-time { font-family: var(--font-mono); font-size: 9px; color: var(--text-dimmer); flex-shrink: 0; }
.history-empty { padding: 20px; text-align: center; color: var(--text-dimmer);
  font-family: var(--font-mono); font-size: 11px; }

/* ── UNIT CONVERTER PANEL ── */
.unit-btn {
  width: 34px; height: 34px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-dim);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  transition: all 0.2s;
}
.unit-btn:hover { border-color: var(--orange); color: var(--orange); background: var(--orange-glow); }

.unit-panel {
  position: fixed;
  top: 64px;
  right: 8px;
  z-index: 99999; /* เพิ่มค่าให้สูงมากๆ */
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 10px;
  width: 340px;
  display: none;
  animation: fadeUp 0.2s ease;
  box-shadow: 0 8px 32px rgba(0,0,0,0.8);
  max-height: 80vh;
  overflow-y: auto;
}
.unit-panel.open { display: block; }

.unit-panel-header {
  padding: 12px 14px 8px;
  border-bottom: 1px solid var(--border);
  font-family: var(--font-mono); font-size: 11px; color: var(--text-dim);
  letter-spacing: 1px;
  display: flex; align-items: center; justify-content: space-between;
}

.unit-tabs {
  display: flex; gap: 0;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
}
.unit-tabs::-webkit-scrollbar { display: none; }

.unit-tab {
  flex-shrink: 0;
  padding: 8px 10px; text-align: center;
  font-family: var(--font-mono); font-size: 10px; color: var(--text-dim);
  cursor: pointer; border: none; background: none;
  border-bottom: 2px solid transparent;
  transition: all 0.15s; letter-spacing: 0.5px;
}
.unit-tab.active { color: var(--orange); border-bottom-color: var(--orange); }
.unit-tab:hover:not(.active) { color: var(--text); }

.unit-content { padding: 12px 14px 14px; }

.unit-all-grid {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.unit-all-row {
  display: grid;
  grid-template-columns: 60px 1fr;
  align-items: center;
  gap: 8px;
}

.unit-all-label {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--orange);
  text-align: right;
  user-select: none;
}

.unit-all-input {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  width: 100%;
}

.unit-all-input:focus {
  border-color: var(--border-bright);
  box-shadow: 0 0 0 2px rgba(255,106,0,0.1);
}

.unit-all-input.result-field { color: #ccc; }

.unit-divider {
  height: 1px;
  background: var(--border);
  margin: 4px 0;
  opacity: 0.5;
}

.unit-hint {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-dimmer);
  text-align: center;
  margin-top: 8px;
  letter-spacing: 0.5px;
}

/* ── CARD BOT MESSAGE ── */
.bot-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-bottom-left-radius: 3px;
  border-radius: 10px;
  max-width: 82%;
  overflow: hidden;
  animation: fadeUp 0.3s ease both;
  position: relative;
  z-index: 2;
}

.bot-card-header {
  background: rgba(255,106,0,0.1);
  border-bottom: 1px solid var(--border);
  padding: 7px 14px;
  display: flex; align-items: center; justify-content: space-between;
}

.bot-card-title {
  font-family: var(--font-mono); font-size: 10px;
  color: var(--orange); letter-spacing: 1px;
}

.bot-card-body { padding: 0; }

.card-section {
  border-bottom: 1px solid rgba(255,106,0,0.08);
  padding: 8px 14px;
}
.card-section:last-child { border-bottom: none; }

.card-section-label {
  font-family: var(--font-mono); font-size: 9px;
  color: var(--text-dimmer); letter-spacing: 1px;
  margin-bottom: 4px; text-transform: uppercase;
}

.card-kv { display: flex; flex-direction: column; gap: 3px; }

.card-row {
  display: flex; justify-content: space-between; align-items: baseline;
  font-family: var(--font-mono); font-size: 12px;
}

.card-key { color: var(--text-dim); }
.card-val { color: var(--text); font-weight: 500; }
.card-val.highlight { color: var(--orange); font-size: 14px; }

.card-plain {
  font-family: var(--font-mono); font-size: 12px;
  color: #e0e0e0; line-height: 1.7; white-space: pre-wrap;
}

.card-actions {
  padding: 6px 14px 8px;
  display: flex; gap: 6px;
}

/* ── VOICE INPUT ── */
.voice-btn {
  width: 34px; height: 34px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-dim);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;

<script>
const storage = (function() {
  try {
    const t = '__test__';
    localStorage.setItem(t, t);
    localStorage.removeItem(t);
    return {
      _mem: {},
      getItem(k)    { try { return localStorage.getItem(k); }    catch(e) { return this._mem[k] || null; } },
      setItem(k, v) { try { localStorage.setItem(k, v); }        catch(e) { this._mem[k] = v; } },
      removeItem(k) { try { localStorage.removeItem(k); }        catch(e) { delete this._mem[k]; } }
    };
  } catch(e) {
    console.warn('localStorage not available, using memory storage');
    const mem = {};
    return {
      _mem: mem,
      getItem(k)    { return mem[k] || null; },
      setItem(k, v) { mem[k] = v; },
      removeItem(k) { delete mem[k]; }
    };
  }
})();

const USER_ID_KEY = 'apitech_userid';

function generateUUID() {
  if (typeof crypto !== 'undefined' && crypto.randomUUID) {
    return crypto.randomUUID();
  }
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    const v = c === 'x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}

function initUser() {
  let uid = storage.getItem(USER_ID_KEY);
  if (!uid) {
    uid = generateUUID();
    storage.setItem(USER_ID_KEY, uid);
  }
  return uid;
}

const userId  = initUser();
const shortId = userId.replace(/-/g, '').slice(0, 6).toUpperCase();
const HISTORY_KEY = 'apitech_history_' + userId;

document.addEventListener('DOMContentLoaded', () => {
  const badge = document.getElementById('userBadge');
  if (badge) {
    badge.textContent = 'USR:' + shortId;
    badge.setAttribute('data-fullid', userId);
  }
  const sessInfo = document.getElementById('historySessionInfo');
  if (sessInfo) {
    sessInfo.textContent = 'SESSION: ' + shortId + ' · ประวัติของคุณเท่านั้น';
  }
  renderHistory();
});

const canvas = document.getElementById('bg-canvas');
const ctx    = canvas.getContext('2d');
let W = canvas.width  = window.innerWidth;
let H = canvas.height = window.innerHeight;

  dieChance: .03, spawnChance: .6, sparkChance: .05, sparkDist: 6,
  color: 'hsl(hue,100%,light%)',
  baseLight: 50, addedLight: 10,
  shadowToTimePropMult: 4,
  baseLightInputMultiplier: .008, addedLightInputMultiplier: .015,
  cx: W/2, cy: H/2, repaintAlpha: .03, hueChange: .02,
};

let tick = 0;
const lines = [];
const dieX  = W/2/opts.len;
const dieY  = H/2/opts.len;
const baseRad = Math.PI*2/6;

ctx.fillStyle = 'black';
ctx.fillRect(0,0,W,H);

class Line {
  constructor() { this.reset(); }
  reset() {
    this.x = 0; this.y = 0; this.addedX = 0; this.addedY = 0; this.rad = 0;
    this.lightInputMultiplier = opts.baseLightInputMultiplier + opts.addedLightInputMultiplier * Math.random();
    this.color = opts.color.replace('hue', tick * opts.hueChange);
    this.cumulativeTime = 0;
    this.beginPhase();
  }
  beginPhase() {
    this.x += this.addedX; this.y += this.addedY;
    this.time = 0;
    this.targetTime = (opts.baseTime + opts.addedTime * Math.random()) | 0;
    this.rad += baseRad * (Math.random() < .5 ? 1 : -1);
    this.addedX = Math.cos(this.rad);
    this.addedY = Math.sin(this.rad);
    if (Math.random() < opts.dieChance || this.x > dieX || this.x < -dieX || this.y > dieY || this.y < -dieY) {
      this.reset();
    }
  }
  step() {
    ++this.time; ++this.cumulativeTime;
    if (this.time >= this.targetTime) this.beginPhase();
    const prop = this.time / this.targetTime;
    const wave = Math.sin(prop * Math.PI / 2);
    ctx.shadowBlur = prop * opts.shadowToTimePropMult;
    ctx.fillStyle = ctx.shadowColor = this.color.replace(
      'light',
      opts.baseLight + opts.addedLight * Math.sin(this.cumulativeTime * this.lightInputMultiplier)
    );
    ctx.fillRect(opts.cx + (this.x + wave*this.addedX)*opts.len, opts.cy + (this.y + wave*this.addedY)*opts.len, 2, 2);
  }
}

function loop() {
  requestAnimationFrame(loop);
  ++tick;
  opts.cx = W/2; opts.cy = H/2;
  ctx.globalCompositeOperation = 'source-over';
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(0,0,0,' + opts.repaintAlpha + ')';
  ctx.fillRect(0,0,W,H);
  ctx.globalCompositeOperation = 'lighter';
  if (lines.length < opts.count && Math.random() < opts.spawnChance) lines.push(new Line());
  lines.forEach(l => l.step());
}
loop();

const webhookURL = "https://a7ivalc0.rpcld.com/webhook/lineoa";
const chat  = document.getElementById('chat');
const input = document.getElementById('messageInput');
let msgCount    = 0;
let lastUserMsg = '';

function updateCharCount(el) {
  document.getElementById('charCount').textContent = el.value.length;
}

function getTime() {
  return new Date().toLocaleTimeString('th-TH', {
    hour: '2-digit', minute: '2-digit', second: '2-digit'
  });
}

function clearChat() {
  chat.innerHTML = '';
  location.reload();
}

function quickAsk(text) {
  input.value = text;
  updateCharCount(input);
  sendMessage();
}

function removeWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

function addMessage(text, sender) {
  removeWelcome();
  msgCount++;
  if (sender === 'user') {
    lastUserMsg = text;
    const wrap   = document.createElement('div');
    wrap.className = 'msg-wrap user';
    const meta   = document.createElement('div');
    meta.className = 'msg-meta';
    meta.textContent = `YOU [${shortId}] · ${getTime()}`;
    const bubble = document.createElement('div');
    bubble.className = 'message';
    bubble.textContent = text;
    wrap.appendChild(meta);
    wrap.appendChild(bubble);
    chat.appendChild(wrap);
  } else {
    const card = buildCard(text, getTime(), lastUserMsg);
    chat.appendChild(card);
  }
  chat.scrollTop = chat.scrollHeight;
}

function addLoading() {
  removeWelcome();
  const wrap = document.createElement('div');
  wrap.className = 'loading-wrap';
  wrap.id = 'loading';
  wrap.innerHTML = `<div class="loading-bubble"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>`;
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function removeLoading() {
  const el = document.getElementById('loading');
  if (el) el.remove();
}

async function sendMessage() {
  const message = input.value.trim();
  if (!message) return;
  addMessage(message, 'user');
  saveToHistory(message);
  input.value = '';
  updateCharCount(input);
  addLoading();
  try {
    const res  = await fetch(webhookURL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message })
    });
    const data = await res.json();
    removeLoading();
    addMessage(data.reply ? data.reply.trim() : 'ไม่มีคำตอบจาก AI', 'bot');
  } catch (e) {
    removeLoading();
    addMessage('ไม่สามารถเชื่อมต่อกับ AI Server ได้\nกรุณาตรวจสอบการเชื่อมต่อและลองใหม่', 'bot');
  }
}

function loadHistory() {
  try {
    return JSON.parse(storage.getItem(HISTORY_KEY) || '[]');
  } catch (e) {
    console.warn('History load error:', e);
    return [];
  }
}

function saveToHistory(msg) {
  try {
    let h = loadHistory();
    h = h.filter(x => x.text !== msg);
    h.unshift({ text: msg, time: getTime() });
    if (h.length > 20) h = h.slice(0, 20);
    storage.setItem(HISTORY_KEY, JSON.stringify(h));
  } catch (e) {
    console.warn('History save error:', e);
  }
  renderHistory();
}

function clearHistory() {
  try { storage.removeItem(HISTORY_KEY); } catch(e) {}
  renderHistory();
}

function renderHistory() {
  const list  = document.getElementById('historyList');
  const badge = document.getElementById('histBadge');
  if (!list || !badge) return;

  const h = loadHistory();

  badge.textContent = h.length;
  badge.style.display = h.length ? 'flex' : 'none';

  list.innerHTML = '';

  if (!h.length) {
    list.innerHTML = '<div class="history-empty">ยังไม่มีประวัติ</div>';
    return;
  }

  h.forEach(x => {
    const item = document.createElement('div');
    item.className = 'history-item';
    const s1 = document.createElement('span');
    s1.textContent = x.text;
    const s2 = document.createElement('span');
    s2.className = 'history-time';
    s2.textContent = x.time;
    item.appendChild(s1);
    item.appendChild(s2);
    item.addEventListener('click', () => {
      input.value = x.text;
      updateCharCount(input);
      toggleHistory();
      setTimeout(() => sendMessage(), 50);
    });
    list.appendChild(item);
  });
}

function toggleHistory() {
  const p = document.getElementById('historyPanel');
  const u = document.getElementById('unitPanel');
  if (!p) return;
  u && u.classList.remove('open');
  p.classList.toggle('open');
  if (p.classList.contains('open')) renderHistory();
}

document.addEventListener('click', e => {
  if (!e.target.closest('.history-panel') && !e.target.closest('.history-btn')) {
    const hp = document.getElementById('historyPanel');
    if (hp) hp.classList.remove('open');
  }
  if (!e.target.closest('.unit-panel') && !e.target.closest('.unit-btn')) {
    const up = document.getElementById('unitPanel');
    if (up) up.classList.remove('open');
  }
});

const unitDefs = {

    inputs: [

      { id:'up_bar', label:'bar',  toBase: v=>v*100,         fromBase: v=>v/100 },
      { id:'up_psi', label:'psi',  toBase: v=>v/0.145038,   fromBase: v=>v*0.145038 },
      { id:'up_atm', label:'atm',  toBase: v=>v*101.325,    fromBase: v=>v/101.325 },
    ]
  },
  torque: {

    inputs: [
      { id:'ut_nm',   label:'Nm',    toBase: v=>v,           fromBase: v=>v },
      { id:'ut_kgf',  label:'kgf·m', toBase: v=>v*9.80665,  fromBase: v=>v/9.80665 },
      { id:'ut_ftlb', label:'ft·lb', toBase: v=>v*1.35582,  fromBase: v=>v/1.35582 },

      { id:'utemp_k', label:'K',  toC: v=>v-273.15,       fromC: v=>v+273.15 },
    ]
  }
};

let currentUnitTab = 'pressure';

function setUnitTab(tab, el) {
  currentUnitTab = tab;
  document.querySelectorAll('.unit-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderUnitContent();
}

function formatUnitValue(val) {
  if (isNaN(val) || !isFinite(val)) return '';
  const abs = Math.abs(val);
  if (abs === 0) return '0';
  if (abs < 0.0001 || abs >= 1e8) return val.toPrecision(4);
  if (Number.isInteger(val)) return val.toString();
  return parseFloat(val.toFixed(4)).toString();
}

function renderUnitContent() {
  const def = unitDefs[currentUnitTab];
  const c   = document.getElementById('unitContent');
  if (!c) return;
  let html = `<div class="unit-all-grid">`;
  def.inputs.forEach((inp, idx) => {
    html += `
      <div class="unit-all-row">
        <span class="unit-all-label">${inp.label}</span>
        <input class="unit-all-input" id="${inp.id}" type="number" placeholder="0" step="any" autocomplete="off"
          oninput="convertFromField('${inp.id}','${currentUnitTab}')" onfocus="this.select()">
      </div>`;
    if (idx === 1 && def.inputs.length > 3) html += `<div class="unit-divider"></div>`;
  });
  html += `</div><div class="unit-hint">▶ พิมพ์ที่ช่องใดก็ได้ · ผลลัพธ์อัปเดตทุกช่องทันที</div>`;
  c.innerHTML = html;
}

function convertFromField(sourceId, tab) {
  try {
    const def    = unitDefs[tab];
    const srcDef = def.inputs.find(x => x.id === sourceId);
    const el     = document.getElementById(sourceId);
    if (!el || !srcDef) return;
    const rawVal = el.value.trim();
    if (rawVal === '' || rawVal === '-') {
      def.inputs.filter(x => x.id !== sourceId).forEach(x => {
        const e2 = document.getElementById(x.id);
        if (e2) { e2.value = ''; e2.classList.remove('result-field'); }
      });
      return;
    }
    const val = parseFloat(rawVal);
    if (isNaN(val)) return;
    const baseVal = tab === 'temp' ? srcDef.toC(val) : srcDef.toBase(val);
    def.inputs.filter(x => x.id !== sourceId).forEach(x => {
      const e2 = document.getElementById(x.id);
      if (!e2) return;
      const converted = tab === 'temp' ? x.fromC(baseVal) : x.fromBase(baseVal);
      e2.value = formatUnitValue(converted);
      e2.classList.add('result-field');
    });
    el.classList.remove('result-field');
  } catch(e) { console.warn('Unit convert error:', e); }
}

function toggleUnit() {
  const p = document.getElementById('unitPanel');
  const h = document.getElementById('historyPanel');
  if (!p) return;
  h && h.classList.remove('open');
  const isOpen = p.classList.toggle('open');
  if (isOpen) {
    renderUnitContent();
    setTimeout(() => {
      const first = p.querySelector('.unit-all-input');
      if (first) first.focus();
    }, 150);
  }
}

function parseToCard(text) {
  const lines = text.split('\n').filter(l => l.trim());
  if (lines.length < 3) return null;
  const sections = [];
  let current = null;
  const isKV = l => /^[\w\s()/%°]+\s*[=≈]\s*.+/.test(l);
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    if (isKV(trimmed)) {
      if (!current || current.type !== 'kv') { current = { type: 'kv', items: [] }; sections.push(current); }
      const sep = trimmed.includes('≈') ? '≈' : '=';
      const idx = trimmed.indexOf(sep);
      current.items.push({ key: trimmed.slice(0, idx).trim(), val: trimmed.slice(idx+1).trim(), sep });
    } else {
      current = { type: 'text', text: trimmed };
      sections.push(current);
      current = null;
    }
  }
  return sections.length >= 2 ? sections : null;
}

function buildCard(text, timeStr, question) {
  const sections = parseToCard(text);
  const card = document.createElement('div');
  card.className = 'msg-wrap bot';
  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  meta.textContent = `AI APITECH · ${timeStr}`;
  card.appendChild(meta);

  if (!sections) {
    const wrap = document.createElement('div');
    wrap.className = 'bot-card';
    const header = document.createElement('div');
    header.className = 'bot-card-header';
    header.innerHTML = '<span class="bot-card-title">AI APITECH</span>';
    const body = document.createElement('div');
    body.className = 'bot-card-body';
    const sec = document.createElement('div');
    sec.className = 'card-section';
    const p = document.createElement('div');
    p.className = 'card-plain';
    p.textContent = text;
    sec.appendChild(p);
    body.appendChild(sec);
    wrap.appendChild(header);
    wrap.appendChild(body);
    card.appendChild(wrap);
    addCardActions(card, wrap, text, question);
    return card;
  }

  const wrap = document.createElement('div');
  wrap.className = 'bot-card';
  const titleSec = sections.find(s => s.type === 'text');
  const header = document.createElement('div');
  header.className = 'bot-card-header';
  header.innerHTML = `<span class="bot-card-title">${titleSec ? titleSec.text.toUpperCase() : 'AI APITECH'}</span>`;
  wrap.appendChild(header);

  const body = document.createElement('div');
  body.className = 'bot-card-body';
  let isFirst = true;
  for (const sec of sections) {
    if (sec.type === 'text' && isFirst) { isFirst = false; continue; }
    const div = document.createElement('div');
    div.className = 'card-section';
    if (sec.type === 'kv') {
      const kv = document.createElement('div');
      kv.className = 'card-kv';
      sec.items.forEach((item, i) => {
        const row = document.createElement('div');
        row.className = 'card-row';
        const isResult = item.sep === '≈' || i === sec.items.length - 1;
        row.innerHTML = `<span class="card-key">${item.key}</span><span class="card-val${isResult?' highlight':''}">${item.sep} ${item.val}</span>`;
        kv.appendChild(row);
      });
      div.appendChild(kv);
    } else {
      const p = document.createElement('div');
      p.className = 'card-plain';
      p.textContent = sec.text;
      div.appendChild(p);
    }
    body.appendChild(div);
    isFirst = false;
  }
  wrap.appendChild(body);
  card.appendChild(wrap);
  addCardActions(card, wrap, text, question);
  return card;
}

function addCardActions(card, wrap, text, question) {
  const actions = document.createElement('div');
  actions.className = 'card-actions';
  const copyBtn = document.createElement('button');
  copyBtn.className = 'copy-btn';
  copyBtn.textContent = 'COPY';
  copyBtn.onclick = () => {
    navigator.clipboard.writeText(text).then(() => {
      copyBtn.textContent = 'COPIED ✓';
      setTimeout(() => copyBtn.textContent = 'COPY', 2000);
    }).catch(e => console.warn('Copy failed:', e));
  };
  const shareBtn = document.createElement('button');
  shareBtn.className = 'share-btn';
  shareBtn.textContent = 'SHARE';
  shareBtn.onclick = () => shareResult(text, question || '');
  actions.appendChild(copyBtn);
  actions.appendChild(shareBtn);
  wrap.appendChild(actions);
}

let recognition  = null;
let isListening  = false;
let voiceTimeout = null;
const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;

function setVoiceUI(active) {
  const btn    = document.getElementById('voiceBtn');
  const status = document.getElementById('voiceStatus');
  if (!btn || !status) return;
  if (active) {
    btn.classList.add('listening');
    status.classList.add('active');
    input.placeholder = '🎙 กำลังฟัง... (พูดได้เลย)';
  } else {
    btn.classList.remove('listening');
    status.classList.remove('active');
    input.placeholder = 'พิมพ์คำถามหรือค่าที่ต้องการคำนวณ...';
  }
}

function stopVoice() {
  isListening = false;
  setVoiceUI(false);
  clearTimeout(voiceTimeout);
  if (recognition) { try { recognition.abort(); } catch(e) {} recognition = null; }
}

function startVoice() {
  if (!SpeechRecognitionAPI) {
    alert('Voice Input ไม่รองรับในเบราว์เซอร์นี้\nกรุณาใช้ Chrome หรือ Edge บน Android/Desktop ครับ');
    return;
  }
  stopVoice();
  const r = new SpeechRecognitionAPI();
  r.lang = 'th-TH'; r.continuous = false; r.interimResults = true; r.maxAlternatives = 3;
  recognition = r;
  r.onstart  = () => { isListening = true; setVoiceUI(true); voiceTimeout = setTimeout(() => { if (isListening) stopVoice(); }, 10000); };
  r.onresult = (e) => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t; else interim += t;
    }
    input.value = final || interim;
    updateCharCount(input);
  };
  r.onend   = () => { const txt = input.value.trim(); stopVoice(); if (txt) setTimeout(() => sendMessage(), 100); };
  r.onerror = (e) => {
    stopVoice();
    const msgs = { 'not-allowed':'ไม่ได้รับอนุญาตใช้ไมโครโฟน\nกรุณากด Allow ในเบราว์เซอร์', 'no-speech':'ไม่ได้ยินเสียง ลองพูดใกล้ไมค์อีกครั้ง', 'network':'เชื่อมต่อ network ไม่ได้', 'aborted':'' };
    const msg = msgs[e.error]; if (msg) alert(msg);
  };
  try { r.start(); } catch(e) { stopVoice(); alert('เริ่ม Voice Input ไม่ได้: ' + e.message); }
}

function toggleVoice() { if (isListening) stopVoice(); else startVoice(); }

function shareResult(text, question) {
  const shareText = ['🔧 AI API TECH T0.1', '', `📌 คำถาม: ${question}`, '', '📊 ผลลัพธ์:', text].join('\n');
  navigator.clipboard.writeText(shareText).then(() => {
    const toast = document.getElementById('shareToast');
    if (toast) { toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2000); }
  }).catch(e => console.warn('Share copy failed:', e));
}
