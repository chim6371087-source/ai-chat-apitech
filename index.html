<!DOCTYPE html>
<!-- ============================================================
  AI API TECH T0.1 — Motorcycle Calculator Chatbot
  ไฟล์นี้คือหน้าเว็บแชทบอทสำหรับคำนวณสูตรรถมอเตอร์ไซค์
  ทำงานโดยส่งคำถามไปที่ n8n webhook แล้วรับผลลัพธ์กลับมาแสดง
  ============================================================ -->
<html lang="th">
<head>
<!-- UTF-8 รองรับภาษาไทยและอักขระพิเศษทุกตัว -->
<meta charset="UTF-8">
<!-- viewport: บอก browser ให้ใช้ความกว้างจริงของหน้าจอ
  - width=device-width   : ไม่ zoom out ให้เห็นหน้าจอเต็ม
  - initial-scale=1.0    : zoom level เริ่มต้น = 1:1
  - viewport-fit=cover   : ขยายถึงขอบจอ iPhone notch/Dynamic Island
  - maximum-scale=1.0    : ป้องกัน iOS zoom เมื่อ tap input -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<title>AI API TECH T0.1</title>
<!-- preconnect: เชื่อมต่อ Google Fonts ล่วงหน้าเพื่อโหลดเร็วขึ้น -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<!-- โหลด font 3 ตัว:
  - Rajdhani      : font หัวข้อ สไตล์ HUD / military (ตัวอักษรอังกฤษ)
  - Sarabun       : font body ภาษาไทย อ่านง่ายบนจอ
  - Share Tech Mono: font monospace สำหรับโค้ด/ผลลัพธ์การคำนวณ -->
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Sarabun:wght@300;400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* ── CSS CUSTOM PROPERTIES (ตัวแปรสี/font ทั้งหมด) ──────────────
  ใช้ :root เพื่อให้เรียกใช้ได้ทุกที่ด้วย var(--ชื่อ)
  แก้สีทั้งเว็บได้จากที่เดียวนี้เลย ──────────────────────────── */
:root {
  --orange: #ff6a00;     /* สีหลัก: ส้มสด ใช้ highlight/ปุ่ม */
  --orange2: #ff9f45;    /* สีส้มอ่อน: hover state ของปุ่ม */
  --orange-glow: rgba(255,106,0,0.3); /* สีส้มโปร่งแสง: พื้นหลัง hover */
  --dark: #080808;       /* สีดำพื้นหลังหลัก เกือบดำสนิท */
  --dark2: #111111;      /* สีดำรอง: เล็กน้อยกว่า --dark */
  --card: #141414;       /* พื้นหลัง card/bubble ของ bot */
  --card2: #1c1c1c;      /* พื้นหลัง input box / panel */
  --border: rgba(255,106,0,0.2);       /* เส้นขอบปกติ: ส้มจาง */
  --border-bright: rgba(255,106,0,0.6); /* เส้นขอบ focus: ส้มเข้ม */
  --text: #f0f0f0;       /* สีข้อความหลัก: ขาวครีม */
  --text-dim: #888;      /* สีข้อความรอง: เทาปานกลาง */
  --text-dimmer: #444;   /* สีข้อความจาง: timestamp / label */
  --green: #00ff88;      /* สีเขียว: ONLINE badge */
  --font-head: 'Rajdhani', sans-serif;  /* font หัวข้อ / ปุ่ม SEND */
  --font-body: 'Sarabun', sans-serif;   /* font body ภาษาไทยทั่วไป */
  --font-mono: 'Share Tech Mono', monospace; /* font monospace: ผลลัพธ์คำนวณ */
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--dark);
  color: var(--text);
  font-family: var(--font-body);
  overflow: hidden;
}

/* ── BACKGROUND: Canvas animation เส้น hex เคลื่อนไหว ────────────
  canvas วาดภาพ animation พื้นหลังด้วย JavaScript (class Line)
  เป็น hex grid pattern สีส้มเคลื่อนไหว สร้าง atmosphere ── */
#bg-canvas {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none;
  width: 100% !important; height: 100% !important;
}

/* ── grid เส้นตาราง overlay ทับบน canvas animation
  ใช้ CSS gradient สร้างเส้นตาราง 40x40px สีส้มจาง
  ให้ดูเหมือนจอ HUD/cockpit ── */
.grid-overlay {
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(255,106,0,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,106,0,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

/* ── vignette: เงามืดรอบขอบจอ ────────────────────────────────
  radial-gradient ทำให้กลางจอสว่าง ขอบมืด
  ช่วยให้ content กลางหน้าโดดเด่นและดูมีความลึก ── */
.vignette {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.85) 100%);
  pointer-events: none;
}

/* ── LAYOUT: โครงสร้างหลักของหน้า ─────────────────────────────
  ใช้ CSS Grid แบ่งเป็น 3 แถว:
    auto  = header (ความสูงตามเนื้อหา)
    1fr   = chat area (กินพื้นที่ที่เหลือทั้งหมด)
    auto  = input area (ความสูงตามเนื้อหา)
  height: 100vh ทำให้เต็มหน้าจอพอดี ── */
#app {
  position: relative; z-index: 1;
  height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr auto;
}

/* ── HEADER: แถบด้านบน ──────────────────────────────────────
  - backdrop-filter: blur = เบลอพื้นหลังที่ส่องผ่านมา (glassmorphism)
  - position: relative = ให้ ::after (เส้นส่องแสง) อ้างอิงตำแหน่งจาก header
  - overflow: hidden = ป้องกัน content ล้นออกไป (mobile fix)
  - flex-shrink: 0 = ไม่ให้ header หดตัวเมื่อหน้าจอเล็ก ── */
header {
  background: rgba(8,8,8,0.95);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  backdrop-filter: blur(20px);
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}

/* ── เส้นแสงส้มที่ขอบล่าง header ─────────────────────────────
  ::after สร้าง pseudo-element เป็นเส้นแสง gradient
  animation scanline ทำให้กะพริบช้าๆ เหมือนสัญญาณ ── */
header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--orange), transparent);
  animation: scanline 4s ease-in-out infinite;
}

@keyframes scanline {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}

.header-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo-img {
  height: 44px;
  width: auto;
  filter: drop-shadow(0 0 8px var(--orange));
}

.header-title {
  font-family: var(--font-head);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--text);
}

.header-title span {
  color: var(--orange);
}

/* ── ONLINE badge: แสดงสถานะระบบ ──────────────────────────────
  แสดงข้อความ "ONLINE" พร้อมจุดเขียวกะพริบ
  ซ่อนบนมือถือ (max-width: 600px) เพราะพื้นที่จำกัด ── */
.status-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--green);
  background: rgba(0,255,136,0.08);
  border: 1px solid rgba(0,255,136,0.25);
  padding: 3px 8px;
  border-radius: 3px;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.status-dot {
  width: 6px; height: 6px;
  background: var(--green);
  border-radius: 50%;
  animation: pulse-green 2s ease-in-out infinite;
}

@keyframes pulse-green {
  0%, 100% { opacity: 1; box-shadow: 0 0 4px var(--green); }
  50% { opacity: 0.4; box-shadow: none; }
}

.header-right {
  display: flex;
  gap: 8px;
}

/* ── icon buttons: ปุ่มรูปไอคอนใน header ────────────────────
  ปุ่มสี่เหลี่ยมขนาด 34x34px ใส่ได้ emoji หรือ icon
  ใช้สำหรับ: ล้างแชท (🧹) ── */
.icon-btn {
  width: 34px; height: 34px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-dim);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  transition: all 0.2s;
}

.icon-btn:hover {
  border-color: var(--orange);
  color: var(--orange);
  background: var(--orange-glow);
}

/* ── CHAT AREA: พื้นที่แสดงบทสนทนา ────────────────────────────
  overflow-y: auto = เลื่อนขึ้น-ลงได้ เมื่อ message มากกว่าพื้นที่
  scroll-behavior: smooth = เลื่อนลงแบบ smooth animation
  -webkit-overflow-scrolling: touch = เลื่อนบน iOS ลื่นมือ (inertia)
  overscroll-behavior: contain = ป้องกันการ scroll ถ่ายทอดไปหน้าอื่น ── */
#chat {
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 0;
  scroll-behavior: smooth;
}

#chat::-webkit-scrollbar { width: 4px; }
#chat::-webkit-scrollbar-track { background: transparent; }
#chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
#chat::-webkit-scrollbar-thumb:hover { background: var(--orange); }

/* ── WELCOME SCREEN: หน้าต้อนรับก่อนเริ่มแชท ─────────────────
  แสดงตอนยังไม่มีข้อความ — ซ่อนเมื่อเริ่มแชท (removeWelcome())
  flex: 1 ทำให้กินพื้นที่เต็ม chat area
  animation fadeUp: ค่อยๆ ปรากฏขึ้นมา ── */
#welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  text-align: center;
  animation: fadeUp 0.6s ease both;
}

.welcome-logo-wrap {
  position: relative;
  margin-bottom: 24px;
}

.welcome-logo {
  height: 100px;
  filter: drop-shadow(0 0 20px var(--orange));
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

/* ── วงแหวนหมุนรอบ logo ─────────────────────────────────────
  วงกลม border ที่หมุนรอบ logo ด้วย animation spin 8 วินาที
  ::before สร้างจุดส้มเล็กที่ขอบบนของวงแหวน (เหมือน satellite) ── */
.welcome-ring {
  position: absolute;
  inset: -16px;
  border-radius: 50%;
  border: 1px solid var(--border);
  animation: spin 8s linear infinite;
}

.welcome-ring::before {
  content: '';
  position: absolute;
  top: -2px; left: 50%;
  width: 4px; height: 4px;
  background: var(--orange);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--orange);
  transform: translateX(-50%);
}

@keyframes spin { to { transform: rotate(360deg); } }

.welcome-title {
  font-family: var(--font-head);
  font-size: 30px;
  font-weight: 700;
  letter-spacing: 4px;
  margin-bottom: 8px;
}

.welcome-title span { color: var(--orange); }

.welcome-sub {
  font-size: 14px;
  color: var(--text-dim);
  letter-spacing: 1px;
  margin-bottom: 32px;
}

/* ── QUICK BUTTONS: ปุ่มลัดหน้าแรก ────────────────────────────
  CSS Grid: auto-fit + minmax(200px, 1fr)
  = จัดคอลัมน์อัตโนมัติ แต่ละช่องกว้างอย่างน้อย 200px
  บนมือถือ override เป็น 2 คอลัมน์ fix width ── */
.quick-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 8px;
  width: 100%;
  max-width: 800px;
}

/* ── quick button แต่ละปุ่ม ──────────────────────────────────
  text-shadow บน hover ทำให้ตัวอักษรดู glow
  transform: translateY(-2px) ทำให้ปุ่มยก "ลอยขึ้น" เมื่อ hover ── */
.quick-btn {
  background: var(--card);
  border: 1px solid rgba(255,106,0,0.4);
  color: #e8e8e8;
  padding: 12px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 500;
  text-align: left;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 10px;
  line-height: 1.4;
  letter-spacing: 0.3px;
  text-shadow: 0 0 12px rgba(255,255,255,0.15);
}

.quick-btn:hover {
  border-color: var(--orange);
  color: #ffffff;
  background: rgba(255,106,0,0.12);
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(255,106,0,0.2);
  text-shadow: 0 0 16px rgba(255,200,100,0.4);
}

.quick-btn .qicon {
  font-size: 18px;
  flex-shrink: 0;
  filter: drop-shadow(0 0 4px rgba(255,106,0,0.5));
}

/* ── MESSAGES ── */
.msg-wrap {
  display: flex;
  flex-direction: column;
  margin-bottom: 16px;
  animation: fadeUp 0.3s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg-wrap.user { align-items: flex-end; }
.msg-wrap.bot  { align-items: flex-start; }

.msg-meta {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-dimmer);
  margin-bottom: 5px;
  letter-spacing: 0.5px;
  padding: 0 4px;
}

.msg-wrap.user .msg-meta { color: rgba(255,106,0,0.4); }

/* ── message bubble: กล่องข้อความ ─────────────────────────────
  max-width: 72% = ไม่กว้างเต็มหน้า เหมือน chat app ทั่วไป
  white-space: pre-wrap = รักษาบรรทัดใหม่และช่องว่างจาก API
  word-break: break-word = ตัดคำที่ยาวเกินออกอัตโนมัติ ── */
.message {
  max-width: 72%;
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 14px;
  line-height: 1.7;
  white-space: pre-wrap;
  word-break: break-word;
}

.msg-wrap.user .message {
  background: linear-gradient(135deg, var(--orange), #ff4500);
  color: #000;
  font-weight: 500;
  border-bottom-right-radius: 3px;
  box-shadow: 0 4px 20px rgba(255,106,0,0.25);
}

.msg-wrap.bot .message {
  background: var(--card);
  border: 1px solid var(--border);
  border-bottom-left-radius: 3px;
  font-family: var(--font-mono);
  font-size: 13px;
  color: #e0e0e0;
}

.msg-wrap.bot .message::before {
  content: '> ';
  color: var(--orange);
  font-weight: bold;
}

/* ── LOADING INDICATOR: จุดกะพริบขณะรอ AI ─────────────────────
  แสดงขณะ fetch ข้อมูลจาก webhook — ซ่อนเมื่อได้รับผลลัพธ์
  3 จุดกะพริบสลับกัน ด้วย animation-delay 0.2s ต่อจุด ── */
.loading-wrap {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 16px;
}

.loading-bubble {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  border-bottom-left-radius: 3px;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.loading-dot {
  width: 6px; height: 6px;
  background: var(--orange);
  border-radius: 50%;
  animation: blink 1.2s ease-in-out infinite;
}
.loading-dot:nth-child(2) { animation-delay: 0.2s; }
.loading-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}

/* ── INPUT AREA: พื้นที่พิมพ์ข้อความด้านล่าง ──────────────────
  padding-bottom ใช้ env(safe-area-inset-bottom) รองรับ iPhone home bar
  (ส่วนที่เป็น gesture bar ด้านล่าง iPhone X ขึ้นไป) ── */
.input-area {
  background: rgba(8,8,8,0.95);
  border-top: 1px solid var(--border);
  padding: 14px 20px;
  backdrop-filter: blur(20px);
  position: relative;
}

.input-area::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--orange), transparent);
  opacity: 0.4;
}

/* ── กล่อง input รวม prefix + input + ปุ่มต่างๆ ───────────────
  flex container แนวนอน ประกอบด้วย:
  » (prefix) | input text | char count | voice btn | SEND btn
  focus-within: เมื่อ child element ใด focus จะเปลี่ยน border ── */
.input-inner {
  display: flex;
  gap: 10px;
  align-items: center;
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 6px 6px 6px 16px;
  transition: border-color 0.2s;
  max-width: 900px;
  margin: 0 auto;
}

.input-inner:focus-within {
  border-color: var(--border-bright);
  box-shadow: 0 0 0 3px rgba(255,106,0,0.08);
}

.input-prefix {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--orange);
  flex-shrink: 0;
  user-select: none;
}

#messageInput {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  caret-color: var(--orange);
}

#messageInput::placeholder { color: var(--text-dimmer); }

.send-btn {
  background: var(--orange);
  border: none;
  color: #000;
  font-family: var(--font-head);
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 2px;
  padding: 9px 20px;
  border-radius: 7px;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
}

.send-btn:hover {
  background: var(--orange2);
  box-shadow: 0 0 16px rgba(255,106,0,0.4);
  transform: translateY(-1px);
}

.send-btn:active { transform: translateY(0); }

/* ── HUD CORNER DECORATIONS: เส้นมุมสี่มุม ─────────────────────
  เส้น L-shape 4 มุมของ chat area เหมือน targeting reticle
  pointer-events: none = คลิกผ่านได้ ไม่บล็อก content ด้านหลัง
  ตำแหน่งปรับตาม header height (68px) และ input height (72px) ── */
.corner-tl, .corner-tr, .corner-bl, .corner-br {
  position: fixed;
  width: 20px; height: 20px;
  z-index: 100;
  pointer-events: none;
}

.corner-tl { top: 68px; left: 4px; border-top: 1px solid var(--orange); border-left: 1px solid var(--orange); }
.corner-tr { top: 68px; right: 4px; border-top: 1px solid var(--orange); border-right: 1px solid var(--orange); }
.corner-bl { bottom: 72px; left: 4px; border-bottom: 1px solid var(--orange); border-left: 1px solid var(--orange); }
.corner-br { bottom: 72px; right: 4px; border-bottom: 1px solid var(--orange); border-right: 1px solid var(--orange); }

/* ── COPY BUTTON: ปุ่ม copy ผลลัพธ์ ──────────────────────────
  ปุ่มเล็กๆ ใต้ card bot — click แล้ว copy text ไป clipboard
  เปลี่ยนข้อความเป็น "COPIED ✓" ชั่วคราว 2 วินาที ── */
.copy-btn {
  display: inline-block;
  margin-top: 6px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-dimmer);
  background: transparent;
  border: 1px solid var(--text-dimmer);
  padding: 2px 8px;
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.2s;
}
.copy-btn:hover { color: var(--orange); border-color: var(--orange); }

/* ── CHAR COUNTER ── */
.char-count {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-dimmer);
  flex-shrink: 0;
  min-width: 28px;
  text-align: right;
}

/* ── HISTORY PANEL: ประวัติการคำนวณ ────────────────────────────
  เก็บ 20 คำถามล่าสุดใน localStorage ของเบราว์เซอร์
  กดปุ่ม 🕐 เพื่อเปิด panel — กด item เพื่อส่งคำถามนั้นใหม่
  badge (ตัวเลข) แสดงจำนวนประวัติที่เก็บไว้ ── */
.history-btn {
  width: 34px; height: 34px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-dim);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  transition: all 0.2s;
  position: relative;
}
.history-btn:hover { border-color: var(--orange); color: var(--orange); background: var(--orange-glow); }
.history-badge {
  position: absolute; top: -4px; right: -4px;
  width: 14px; height: 14px;
  background: var(--orange); border-radius: 50%;
  font-size: 9px; font-family: var(--font-mono);
  color: #000; display: flex; align-items: center; justify-content: center;
  font-weight: bold;
}
.history-panel {
  position: absolute; top: 70px; right: 15px; z-index: 500;
  background: var(--card2); border: 1px solid var(--border);
  border-radius: 10px; width: 320px; max-height: 360px;
  overflow-y: auto; display: none; animation: fadeUp 0.2s ease;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}
.history-panel.open { display: block; }
.history-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px 8px;
  border-bottom: 1px solid var(--border);
  font-family: var(--font-mono); font-size: 11px; color: var(--text-dim);
  letter-spacing: 1px;
}
.history-clear {
  background: none; border: none; color: var(--text-dimmer);
  cursor: pointer; font-size: 10px; font-family: var(--font-mono);
  transition: color 0.2s;
}
.history-clear:hover { color: var(--orange); }
.history-item {
  padding: 9px 14px; cursor: pointer;
  border-bottom: 1px solid rgba(255,106,0,0.06);
  font-family: var(--font-body); font-size: 13px; color: var(--text-dim);
  transition: all 0.15s; display: flex; align-items: center; gap: 8px;
}
.history-item:hover { background: rgba(255,106,0,0.07); color: var(--text); }
.history-item span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.history-time { font-family: var(--font-mono); font-size: 9px; color: var(--text-dimmer); flex-shrink: 0; }
.history-empty { padding: 20px; text-align: center; color: var(--text-dimmer);
  font-family: var(--font-mono); font-size: 11px; }

/* ── UNIT CONVERTER: แปลงหน่วย ─────────────────────────────────
  กดปุ่ม ⚖ เปิด panel แปลงหน่วย 4 หมวด:
  แรงดัน (kPa/bar/psi/atm), แรงบิด (Nm/kgf·m/ft·lb),
  ความยาว (mm/cm/inch/m), ความเร็ว (km/h/mph/m/s/knot)
  พิมพ์ค่าในช่องใดช่องหนึ่ง ผลลัพธ์ทุกหน่วยแสดงทันที ── */
.unit-btn {
  width: 34px; height: 34px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-dim);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  transition: all 0.2s;
}
.unit-btn:hover { border-color: var(--orange); color: var(--orange); background: var(--orange-glow); }
.unit-panel {
  position: absolute; top: 70px; right: 58px; z-index: 500;
  background: var(--card2); border: 1px solid var(--border);
  border-radius: 10px; width: 300px;
  display: none; animation: fadeUp 0.2s ease;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}
.unit-panel.open { display: block; }
.unit-panel-header {
  padding: 12px 14px 8px;
  border-bottom: 1px solid var(--border);
  font-family: var(--font-mono); font-size: 11px; color: var(--text-dim);
  letter-spacing: 1px;
}
.unit-tabs {
  display: flex; gap: 0;
  border-bottom: 1px solid var(--border);
}
.unit-tab {
  flex: 1; padding: 7px 4px; text-align: center;
  font-family: var(--font-mono); font-size: 10px; color: var(--text-dim);
  cursor: pointer; border: none; background: none;
  border-bottom: 2px solid transparent;
  transition: all 0.15s; letter-spacing: 0.5px;
}
.unit-tab.active { color: var(--orange); border-bottom-color: var(--orange); }
.unit-content { padding: 12px 14px; }
.unit-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
.unit-input {
  flex: 1; background: var(--card); border: 1px solid var(--border);
  border-radius: 6px; padding: 7px 10px; color: var(--text);
  font-family: var(--font-mono); font-size: 12px;
  outline: none; transition: border-color 0.2s;
}
.unit-input:focus { border-color: var(--border-bright); }
.unit-label {
  font-family: var(--font-mono); font-size: 10px; color: var(--orange);
  min-width: 36px; text-align: right;
}
.unit-result {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 6px; padding: 8px 12px; margin-top: 6px;
  font-family: var(--font-mono); font-size: 11px; color: var(--text);
  line-height: 1.8;
}
.unit-result span { color: var(--orange); }

/* ── CARD-STYLE BOT MESSAGE: แสดงผลแบบ card ────────────────────
  แทนที่การแสดงผล pre-wrap แบบเดิม
  parser จะวิเคราะห์ข้อความว่ามี key=value pattern ไหม
  ถ้ามี → แสดงเป็น card sections พร้อม highlight ผลลัพธ์สุดท้าย
  ถ้าไม่มี → แสดงเป็น plain text ใน card ── */
.bot-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-bottom-left-radius: 3px;
  border-radius: 10px;
  max-width: 82%;
  overflow: hidden;
  animation: fadeUp 0.3s ease both;
}
.bot-card-header {
  background: rgba(255,106,0,0.1);
  border-bottom: 1px solid var(--border);
  padding: 7px 14px;
  display: flex; align-items: center; justify-content: space-between;
}
.bot-card-title {
  font-family: var(--font-mono); font-size: 10px;
  color: var(--orange); letter-spacing: 1px;
}
.bot-card-body { padding: 0; }
.card-section {
  border-bottom: 1px solid rgba(255,106,0,0.08);
  padding: 8px 14px;
}
.card-section:last-child { border-bottom: none; }
.card-section-label {
  font-family: var(--font-mono); font-size: 9px;
  color: var(--text-dimmer); letter-spacing: 1px;
  margin-bottom: 4px; text-transform: uppercase;
}
.card-kv { display: flex; flex-direction: column; gap: 3px; }
.card-row {
  display: flex; justify-content: space-between; align-items: baseline;
  font-family: var(--font-mono); font-size: 12px;
}
.card-key { color: var(--text-dim); }
.card-val { color: var(--text); font-weight: 500; }
.card-val.highlight { color: var(--orange); font-size: 14px; }
.card-plain {
  font-family: var(--font-mono); font-size: 12px;
  color: #e0e0e0; line-height: 1.7; white-space: pre-wrap;
}
.card-actions {
  padding: 6px 14px 8px;
  display: flex; gap: 6px;
}

/* ── VOICE INPUT: รับเสียงพูด ──────────────────────────────────
  ใช้ Web Speech API (รองรับ Chrome/Edge เท่านั้น)
  กดปุ่ม 🎙 เพื่อเริ่มฟัง — ปุ่มเปลี่ยนเป็นสีแดงกะพริบขณะฟัง
  เมื่อพูดเสร็จ ส่งคำถามอัตโนมัติ (onend → sendMessage) ── */
.voice-btn {
  width: 34px; height: 34px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-dim);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  transition: all 0.2s;
  flex-shrink: 0;
}
.voice-btn:hover { border-color: var(--orange); color: var(--orange); background: var(--orange-glow); }
.voice-btn.listening {
  border-color: #ff3333;
  color: #ff3333;
  background: rgba(255,51,51,0.12);
  animation: pulse-red 1s ease-in-out infinite;
}
@keyframes pulse-red {
  0%,100% { box-shadow: 0 0 0 0 rgba(255,51,51,0.4); }
  50%      { box-shadow: 0 0 0 6px rgba(255,51,51,0); }
}
.voice-status {
  font-family: var(--font-mono);
  font-size: 10px;
  color: #ff3333;
  letter-spacing: 1px;
  margin-left: 4px;
  flex-shrink: 0;
  display: none;
}
.voice-status.active { display: inline; animation: blink-text 1s ease-in-out infinite; }
@keyframes blink-text { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── SHARE BUTTON: แชร์ผลลัพธ์ ─────────────────────────────────
  ปุ่ม SHARE ใต้ทุก card — click แล้ว copy ข้อความรูปแบบ:
  🔧 AI API TECH T0.1 / 📌 คำถาม: ... / 📊 ผลลัพธ์: ...
  ไปที่ clipboard เพื่อแปะใน LINE หรือ Facebook ── */
.share-btn {
  display: inline-block;
  margin-top: 0;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-dimmer);
  background: transparent;
  border: 1px solid var(--text-dimmer);
  padding: 2px 8px;
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.2s;
}
.share-btn:hover { color: #00cc66; border-color: #00cc66; }

/* ── SHARE TOAST: แจ้งเตือน copy สำเร็จ ─────────────────────────
  popup เล็กๆ ด้านล่างกลางหน้าจอ แสดง "COPIED TO CLIPBOARD"
  ปรากฏ 2 วินาทีแล้วหายไป — ใช้ opacity transition (ไม่ใช่ display) ── */
.share-toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: #00cc66; color: #000;
  font-family: var(--font-mono); font-size: 11px; font-weight: 700;
  padding: 8px 20px; border-radius: 20px;
  letter-spacing: 1px; z-index: 9999;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
.share-toast.show { opacity: 1; }

/* ════════════════════════════════════════════════
   MOBILE RESPONSIVE — รองรับทุกขนาดจอ
   ────────────────────────────────────────────────
   3 breakpoint:
   ≤600px   : มือถือ (phone)
   601-900px: แท็บเล็ต
   >900px   : desktop (ใช้ style ปกติ ไม่มี override)
   ════════════════════════════════════════════════ */

/* ── ป้องกันล้นออกด้านขวา ── */
* { max-width: 100%; }
img, video, canvas { max-width: 100%; height: auto; }

/* ── Header mobile ── */
@media (max-width: 600px) {
  header {
    padding: 0 12px;
    height: 54px;
  }
  .logo-img { height: 32px; }
  .header-title { font-size: 16px; letter-spacing: 1px; }
  .status-badge { display: none; }
  .header-left { gap: 8px; }
  .header-right { gap: 6px; }

  /* ปุ่ม header เล็กลง */
  .icon-btn, .unit-btn, .history-btn {
    width: 30px; height: 30px;
    font-size: 12px;
  }

  /* HUD corners ปรับตาม header ใหม่ */
  .corner-tl, .corner-tr { top: 58px; }
  .corner-bl, .corner-br { bottom: 62px; }
}

/* ── Chat area ── */
@media (max-width: 600px) {
  #chat { padding: 12px; }

  /* Message bubble */
  .message { max-width: 90%; font-size: 13px; padding: 10px 12px; }
  .bot-card { max-width: 95%; }
  .card-row { font-size: 11px; }
  .card-plain { font-size: 11px; }
}

/* ── Quick buttons grid ── */
@media (max-width: 600px) {
  .quick-grid {
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .quick-btn {
    padding: 10px 10px;
    font-size: 12px;
    gap: 6px;
  }
  .quick-btn .qicon { font-size: 15px; }
  #welcome { padding: 20px 10px; }
  .welcome-title { font-size: 22px; letter-spacing: 2px; }
  .welcome-logo { height: 70px; }
  .welcome-sub { font-size: 12px; margin-bottom: 20px; }
}

/* ── Input area ── */
@media (max-width: 600px) {
  .input-area { padding: 10px 12px; }
  .input-inner { padding: 5px 5px 5px 12px; gap: 6px; }
  #messageInput { font-size: 13px; }
  .send-btn { padding: 8px 14px; font-size: 11px; letter-spacing: 1px; }
  .voice-btn { width: 30px; height: 30px; font-size: 13px; }
  .char-count { min-width: 22px; font-size: 9px; }
}

/* ── Panels (History / Unit) ── */
@media (max-width: 600px) {
  .history-panel {
    position: fixed;
    top: 58px; right: 0; left: 0;
    width: 100%;
    max-height: 55vh;
    border-radius: 0 0 12px 12px;
    z-index: 1000;
  }
  .unit-panel {
    position: fixed;
    top: 58px; right: 0; left: 0;
    width: 100%;
    border-radius: 0 0 12px 12px;
    z-index: 1000;
  }
  .unit-tab { font-size: 9px; padding: 6px 2px; }
  .unit-input { font-size: 11px; padding: 6px 8px; }
}

/* ── Tablet (601–900px) ── */
@media (min-width: 601px) and (max-width: 900px) {
  .quick-grid { grid-template-columns: repeat(3, 1fr); }
  .quick-btn { font-size: 13px; padding: 10px 12px; }
  .message { max-width: 82%; }
  .bot-card { max-width: 88%; }
  header { padding: 0 16px; }
}

/* ── ป้องกัน iOS bounce และ overflow ── */
#app { overflow: hidden; }
#chat { -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }
body { overscroll-behavior: none; }

/* ── Safe area: รองรับ iPhone notch และ home bar ─────────────
   env(safe-area-inset-*) = ค่าระยะห่างจาก hardware ของ iPhone
   ทำให้ content ไม่ถูกบัง notch ซ้าย/ขวา หรือ home bar ล่าง ── */
.input-area {
  padding-bottom: calc(14px + env(safe-area-inset-bottom));
}
header {
  padding-left: max(24px, env(safe-area-inset-left));
  padding-right: max(24px, env(safe-area-inset-right));
}

/* ── Touch targets: ขนาดขั้นต่ำนิ้วสัมผัส ─────────────────────
   Apple Human Interface Guideline แนะนำ minimum 44x44pt
   (hover: none) and (pointer: coarse) = detect touchscreen
   ป้องกันนิ้วกดพลาดปุ่มเล็กเกินไป ── */
@media (hover: none) and (pointer: coarse) {
  .quick-btn { min-height: 44px; }
  .send-btn, .voice-btn, .icon-btn, .unit-btn, .history-btn {
    min-height: 40px; min-width: 40px;
  }
  .history-item { min-height: 44px; }
}
</style>
</head>
<body>

<!-- Canvas element: JavaScript วาด hex animation พื้นหลังที่นี่ -->
<canvas id="bg-canvas"></canvas>
<!-- Grid overlay: เส้นตาราง CSS บน canvas -->
<div class="grid-overlay"></div>
<!-- Vignette: เงามืดรอบขอบจอ CSS gradient -->
<div class="vignette"></div>

<!-- HUD Corners: เส้น L-shape 4 มุม ตกแต่ง ไม่มี interaction -->
<div class="corner-tl"></div>
<div class="corner-tr"></div>
<div class="corner-bl"></div>
<div class="corner-br"></div>

<!-- #app: grid container หลัก (header | chat | input) -->
<div id="app">
  <header>
    <div class="header-left">
      <img src="logochim.png" class="logo-img" alt="logo" onerror="this.style.display='none'">
      <div>
        <div class="header-title">AI API<span> TECH</span> T0.1</div>
      </div>
      <div class="status-badge">
        <div class="status-dot"></div>
        ONLINE
      </div>
    </div>
    <div class="header-right">
      <button class="unit-btn" onclick="toggleUnit()" title="แปลงหน่วย">⚖</button>
      <button class="history-btn" onclick="toggleHistory()" title="ประวัติ" id="historyBtn">
        🕐<span class="history-badge" id="histBadge" style="display:none">0</span>
      </button>
      <button class="icon-btn" onclick="clearChat()" title="ล้างแชท">🧹</button>
    </div>

  <!-- History Panel: dropdown แสดงประวัติ 20 รายการล่าสุด -->
  <div class="history-panel" id="historyPanel">
    <div class="history-header">
      <span>HISTORY</span>
      <button class="history-clear" onclick="clearHistory()">ล้างทั้งหมด</button>
    </div>
    <div id="historyList"><div class="history-empty">ยังไม่มีประวัติ</div></div>
  </div>

  <!-- Unit Converter Panel: dropdown แปลงหน่วย 4 หมวด -->
  <div class="unit-panel" id="unitPanel">
    <div class="unit-panel-header">UNIT CONVERTER</div>
    <div class="unit-tabs">
      <button class="unit-tab active" onclick="setUnitTab('pressure',this)">แรงดัน</button>
      <button class="unit-tab" onclick="setUnitTab('torque',this)">แรงบิด</button>
      <button class="unit-tab" onclick="setUnitTab('length',this)">ความยาว</button>
      <button class="unit-tab" onclick="setUnitTab('speed',this)">ความเร็ว</button>
    </div>
    <div class="unit-content" id="unitContent"></div>
  </div>
  </header>

  <div id="chat">
    <div id="welcome">
      <div class="welcome-logo-wrap">
        <img src="logo1.png" class="welcome-logo" alt="logo" onerror="this.style.display='none'">
        <div class="welcome-ring"></div>
      </div>
      <div class="welcome-title">AI API <span>TECH</span> T0.1</div>
      <div class="welcome-sub">ระบบวิเคราะห์และคำนวณเครื่องยนต์อัจฉริยะ</div>
      <div class="quick-grid">
        <!-- ── Quick Buttons กลุ่มที่ 1: เครื่องยนต์พื้นฐาน (8 ปุ่ม) ── -->
        <button class="quick-btn" onclick="quickAsk('รหัสความผิดปกติHonda(ฮอนด้า) รหัส 1-2A: MAP:IAP sensor #1- High ,ตัวตรวจจับ MAP มีแรงเคลื่อนไฟฟ้าสูง / รหัส P0301')">
          <span class="qicon">🔍</span>รหัสความผิดปกติ OBD / ECU
        </button>
        <button class="quick-btn" onclick="quickAsk('(bore  stroke cc ชัก ใส่ 3 ค่าที่รู้ ตอบ 1 ค่า )')">
          <span class="qicon">⚙️</span>คำนวณ CC / รูลูกสูบ / ระยะชัก
        </button>
        <button class="quick-btn" onclick="quickAsk('(afr 14.7 airflow 300)   (afr 13 airflow 280)   (อัตราส่วนอากาศ 12.5 ปริมาณอากาศ 250)   (ส่วนผสมอากาศ 14 airflow 320)')">
          <span class="qicon">💨</span>อัตราส่วนอากาศต่อเชื้อเพลิง (AFR)
        </button>
        <button class="quick-btn" onclick="quickAsk('(150cc chamber 14)   (170cc chamber 15)   (155 ซีซี ห้องเผาไหม้ 13)   (200cc chamber 16.5)')">
          <span class="qicon">🔩</span>อัตราส่วนกำลังอัดสถิต (Static CR)
        </button>
        <button class="quick-btn" onclick="quickAsk('(stroke 55 rpm 9000)   (150cc rpm 8500)   (150cc stroke 55 rpm 9000)')">
          <span class="qicon">📊</span>ความเร็วลูกสูบเฉลี่ย + ปริมาณอากาศ
        </button>
        <button class="quick-btn" onclick="quickAsk('(cr 11)  (cr 12 k 9)  (pressure 1200)  (แรงดัน 1100)')">
          <span class="qicon">💥</span>แรงดันตอนอัด / แรงดันตอนระเบิด

<script>
/* ════════════════════════════════════════════════════════════
   JAVASCRIPT — แบ่งเป็น 7 ส่วน:
   1. HEX BACKGROUND    : animation พื้นหลัง canvas
   2. CHAT SYSTEM       : ส่ง/รับ message + แสดงผล
   3. HISTORY           : บันทึก/โหลดประวัติ localStorage
   4. UNIT CONVERTER    : แปลงหน่วย
   5. CARD RENDERER     : parse และแสดงผลแบบ card
   6. VOICE INPUT       : รับเสียงด้วย Web Speech API
   7. SHARE RESULT      : copy ผลลัพธ์ไป clipboard
   ════════════════════════════════════════════════════════════ */

/* ── 1. HEX BACKGROUND ──────────────────────────────────────────
   วาด animation บน <canvas> ด้วย requestAnimationFrame
   Line class: จุดแต่ละจุดเดินเป็น hex grid pattern
   ctx.globalCompositeOperation='lighter' ทำให้สีบวกกัน (bloom effect) */
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;

window.addEventListener('DOMContentLoaded', () => { try { renderHistory(); } catch(e) {} });

window.addEventListener('resize', () => {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
});

/* ── hex animation ชะลอลง ──
   baseTime/addedTime สูงขึ้น = แต่ละเส้นเคลื่อนช้าลง
   count ลดลง = เส้นน้อยลง จอไม่รกและประหยัด CPU
   repaintAlpha ต่ำลง = รอยหางเส้นยาวขึ้น ดู smooth กว่า
   hueChange ต่ำลง = สีเปลี่ยนช้าลง */
const opts = {
  len: 18, count: 25, baseTime: 30, addedTime: 25,
  dieChance: .03, spawnChance: .6, sparkChance: .05, sparkDist: 6,
  color: 'hsl(hue,100%,light%)', baseLight: 50, addedLight: 10,
  shadowToTimePropMult: 4, baseLightInputMultiplier: .008,
  addedLightInputMultiplier: .015, cx: W/2, cy: H/2,
  repaintAlpha: .03, hueChange: .02
};

let tick = 0;
const lines = [];
const dieX = W/2/opts.len;
const dieY = H/2/opts.len;
const baseRad = Math.PI*2/6;

ctx.fillStyle = 'black';
ctx.fillRect(0,0,W,H);

class Line {
  constructor() { this.reset(); }
  reset() {
    this.x = 0; this.y = 0; this.addedX = 0; this.addedY = 0; this.rad = 0;
    this.lightInputMultiplier = opts.baseLightInputMultiplier + opts.addedLightInputMultiplier * Math.random();
    this.color = opts.color.replace('hue', tick * opts.hueChange);
    this.cumulativeTime = 0;
    this.beginPhase();
  }
  beginPhase() {
    this.x += this.addedX; this.y += this.addedY;
    this.time = 0;
    this.targetTime = (opts.baseTime + opts.addedTime * Math.random()) | 0;
    this.rad += baseRad * (Math.random() < .5 ? 1 : -1);
    this.addedX = Math.cos(this.rad); this.addedY = Math.sin(this.rad);
    if (Math.random() < opts.dieChance || this.x > dieX || this.x < -dieX || this.y > dieY || this.y < -dieY)
      this.reset();
  }
  step() {
    ++this.time; ++this.cumulativeTime;
    if (this.time >= this.targetTime) this.beginPhase();
    const prop = this.time / this.targetTime;
    const wave = Math.sin(prop * Math.PI / 2);
    const x = this.addedX * wave, y = this.addedY * wave;
    ctx.shadowBlur = prop * opts.shadowToTimePropMult;
    ctx.fillStyle = ctx.shadowColor = this.color.replace(
      'light', opts.baseLight + opts.addedLight * Math.sin(this.cumulativeTime * this.lightInputMultiplier)
    );
    ctx.fillRect(opts.cx + (this.x + x) * opts.len, opts.cy + (this.y + y) * opts.len, 2, 2);
  }
}

function loop() {
  requestAnimationFrame(loop);
  ++tick;
  opts.cx = W/2; opts.cy = H/2;
  ctx.globalCompositeOperation = 'source-over';
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(0,0,0,' + opts.repaintAlpha + ')';
  ctx.fillRect(0,0,W,H);
  ctx.globalCompositeOperation = 'lighter';
  if (lines.length < opts.count && Math.random() < opts.spawnChance) lines.push(new Line());
  lines.forEach(l => l.step());
}
loop();

/* ── 2. CHAT SYSTEM ────────────────────────────────────────────
   webhookURL: endpoint n8n ที่รับคำถามและส่งคำตอบกลับ
   sendMessage(): POST {message} ไป webhook → รับ {reply} กลับ
   addMessage(): เพิ่ม message bubble ใน #chat
   addLoading() / removeLoading(): แสดง/ซ่อน 3 จุดกะพริบ ── */
const webhookURL = "https://a7ivalc0.rpcld.com/webhook-test/lineoa"; 
const chat = document.getElementById('chat');
const input = document.getElementById('messageInput');
let msgCount = 0;
let lastUserMsg = '';

function updateCharCount(el) {
  document.getElementById('charCount').textContent = el.value.length;
}

function getTime() {
  return new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function clearChat() {
  chat.innerHTML = '';
  location.reload();
}

function quickAsk(text) {
  input.value = text;
  updateCharCount(input);
  sendMessage();
}

  if (w) w.remove();

/* ── 3. HISTORY ─────────────────────────────────────────────────
   HISTORY_KEY: key สำหรับ localStorage
   saveToHistory(): เพิ่ม message ใหม่ + dedup + จำกัด 20 รายการ
   renderHistory(): วาด list ใน panel พร้อม badge จำนวน
   reuseHistory(): กด item → ใส่ใน input → ส่งทันที ── */
const HISTORY_KEY = 'apitech_history';
function loadHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch { return []; }
}
function saveToHistory(msg) {
  try {
    let h = loadHistory();
    h = h.filter(x => x.text !== msg);
    h.unshift({ text: msg, time: getTime() });
    if (h.length > 20) h = h.slice(0, 20);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
  } catch(e) { console.warn('History save:', e); }
  renderHistory();
}
function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function renderHistory() {
  const list = document.getElementById('historyList');
  const badge = document.getElementById('histBadge');
  if (!list || !badge) return;
  const h = loadHistory();
  badge.textContent = h.length;
  badge.style.display = h.length ? 'flex' : 'none';
  list.innerHTML = '';
  if (!h.length) {
    list.innerHTML = '<div class="history-empty">ยังไม่มีประวัติ</div>';
    return;
  }
  h.forEach(x => {
    const item = document.createElement('div');
    item.className = 'history-item';
    const s1 = document.createElement('span');
    s1.textContent = x.text;
    const s2 = document.createElement('span');
    s2.className = 'history-time';
    s2.textContent = x.time;
    item.appendChild(s1);
    item.appendChild(s2);
    item.addEventListener('click', () => {
      input.value = x.text;
      updateCharCount(input);
      toggleHistory();
      setTimeout(() => sendMessage(), 50);
    });
    list.appendChild(item);
  });
}
function reuseHistory(text) {
  input.value = text;
  updateCharCount(input);
  toggleHistory();
  sendMessage();
}
function clearHistory() {
  localStorage.removeItem(HISTORY_KEY);
  renderHistory();
}
function toggleHistory() {
  const p = document.getElementById('historyPanel');
  const u = document.getElementById('unitPanel');
  u.classList.remove('open');
  p.classList.toggle('open');
  if (p.classList.contains('open')) renderHistory();
}
document.addEventListener('click', e => {
  if (!e.target.closest('.history-panel') && !e.target.closest('.history-btn'))
    document.getElementById('historyPanel').classList.remove('open');
  if (!e.target.closest('.unit-panel') && !e.target.closest('.unit-btn'))
    document.getElementById('unitPanel').classList.remove('open');
});

/* ── 4. UNIT CONVERTER ──────────────────────────────────────────
   unitDefs: object เก็บนิยามหน่วยทุกหมวด
   toBase(): แปลงหน่วยนั้น → หน่วยฐาน (kPa / Nm / mm / km/h)
   fromBase(): แปลงหน่วยฐาน → หน่วยนั้น
   convertUnit(): อ่านค่า input → แปลงทุกหน่วย → แสดง ── */
const unitDefs = {
  pressure: {
    label: 'แรงดัน',
    inputs: [
      { id:'up_kpa', label:'kPa', toBase: v=>v, fromBase: v=>v },
      { id:'up_bar', label:'bar', toBase: v=>v*100, fromBase: v=>v/100 },
      { id:'up_psi', label:'psi', toBase: v=>v/0.145038, fromBase: v=>v*0.145038 },
      { id:'up_atm', label:'atm', toBase: v=>v*101.325, fromBase: v=>v/101.325 },
    ]
  },
  torque: {
    label: 'แรงบิด',
    inputs: [
      { id:'ut_nm',   label:'Nm',     toBase: v=>v, fromBase: v=>v },
      { id:'ut_kgf',  label:'kgf·m',  toBase: v=>v*9.80665, fromBase: v=>v/9.80665 },
      { id:'ut_ftlb', label:'ft·lb',  toBase: v=>v*1.35582, fromBase: v=>v/1.35582 },
      { id:'ut_inlb', label:'in·lb',  toBase: v=>v*0.11298, fromBase: v=>v/0.11298 },
    ]
  },
  length: {
    label: 'ความยาว',
    inputs: [
      { id:'ul_mm',   label:'mm',   toBase: v=>v, fromBase: v=>v },
      { id:'ul_cm',   label:'cm',   toBase: v=>v*10, fromBase: v=>v/10 },
      { id:'ul_inch', label:'inch', toBase: v=>v*25.4, fromBase: v=>v/25.4 },
      { id:'ul_m',    label:'m',    toBase: v=>v*1000, fromBase: v=>v/1000 },
    ]
  },
  speed: {
    label: 'ความเร็ว',
    inputs: [
      { id:'us_kmh', label:'km/h', toBase: v=>v, fromBase: v=>v },
      { id:'us_mph', label:'mph',  toBase: v=>v*1.60934, fromBase: v=>v/1.60934 },
      { id:'us_ms',  label:'m/s',  toBase: v=>v*3.6, fromBase: v=>v/3.6 },
      { id:'us_knot',label:'knot', toBase: v=>v*1.852, fromBase: v=>v/1.852 },
    ]
  }
};
let currentUnitTab = 'pressure';
function setUnitTab(tab, el) {
  currentUnitTab = tab;
  document.querySelectorAll('.unit-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderUnitContent();
}
function renderUnitContent() {
  const def = unitDefs[currentUnitTab];
  const c = document.getElementById('unitContent');
  c.innerHTML = def.inputs.map(inp => `
    <div class="unit-row">
      <input class="unit-input" id="${inp.id}" type="number" placeholder="0"
        oninput="convertUnit('${inp.id}','${currentUnitTab}')">
      <span class="unit-label">${inp.label}</span>
    </div>`).join('') + '<div class="unit-result" id="unitResult" style="display:none"></div>';
}
function convertUnit(sourceId, tab) {
  try {
    const def = unitDefs[tab];
    const srcDef = def.inputs.find(x => x.id === sourceId);
    const el = document.getElementById(sourceId);
    if (!el) return;
    const val = parseFloat(el.value);
    const r = document.getElementById('unitResult');
    if (!r) return;
    if (isNaN(val) || el.value.trim() === '') {
      r.style.display = 'none';
      // ล้างค่าอื่น
      def.inputs.filter(x => x.id !== sourceId)
        .forEach(x => { const el2 = document.getElementById(x.id); if(el2) el2.value = ''; });
      return;
    }
    const base = srcDef.toBase(val);
    const rows = def.inputs
      .filter(x => x.id !== sourceId)
      .map(x => {
        const converted = x.fromBase(base);
        // แสดงทศนิยมน้อยลงถ้าเป็นจำนวนเต็ม
        const display = Number.isInteger(converted) ? converted.toString() : converted.toFixed(4).replace(/\.?0+$/, '');
        return `<div style="display:flex;justify-content:space-between;padding:2px 0">
          <span style="color:var(--text-dim)">${x.label}</span>
          <span style="color:var(--orange);font-weight:500">${display}</span>
        </div>`;
      }).join('');
    r.style.display = 'block';
    r.innerHTML = rows;
    // ไม่ล้างค่า input อื่น ทำให้ใช้งานสับสน
  } catch(e) { console.warn('Unit convert error', e); }
}
function toggleUnit() {
  const p = document.getElementById('unitPanel');
  const h = document.getElementById('historyPanel');
  if (!p) return;
  h && h.classList.remove('open');
  const isOpen = p.classList.toggle('open');
  if (isOpen) {
    renderUnitContent();
    // focus input แรกเมื่อเปิด
    setTimeout(() => {
      const first = p.querySelector('.unit-input');
      if (first) first.focus();
    }, 100);
  }
}

/* ── 5. CARD MESSAGE RENDERER ───────────────────────────────────
   parseToCard(): วิเคราะห์ข้อความว่ามี key=value / key≈value ไหม
     → คืน sections array [{ type:'kv'|'text', items/text }]
   buildCard(): สร้าง DOM element จาก sections
     → header (ชื่อ calculator) + body (แถว key-val) + actions
   addCardActions(): เพิ่มปุ่ม COPY และ SHARE ── */
function parseToCard(text) {
  const lines = text.split('\n').filter(l => l.trim());
  if (lines.length < 3) return null;
  const sections = [];
  let current = null;
  const isKV = l => /^[\w\s()/%°]+\s*=\s*.+/.test(l) || /^[\w\s()/%°]+\s*≈\s*.+/.test(l);
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    if (isKV(trimmed)) {
      if (!current || current.type !== 'kv') {
        current = { type: 'kv', items: [] };
        sections.push(current);
      }
      const sep = trimmed.includes('≈') ? '≈' : '=';
      const idx = trimmed.indexOf(sep);
      current.items.push({ key: trimmed.slice(0, idx).trim(), val: trimmed.slice(idx+1).trim(), sep });
    } else {
      current = { type: 'text', text: trimmed };
      sections.push(current);
      current = null;
    }
  }
  return sections.length >= 2 ? sections : null;
}

function buildCard(text, timeStr, question) {
  const sections = parseToCard(text);
  const card = document.createElement('div');
  card.className = 'msg-wrap bot';

  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  meta.textContent = `AI APITECH · ${timeStr}`;
  card.appendChild(meta);

  if (!sections) {
    const wrap = document.createElement('div');
    wrap.className = 'bot-card';
    const header = document.createElement('div');
    header.className = 'bot-card-header';
    header.innerHTML = '<span class="bot-card-title">AI APITECH</span>';
    const body = document.createElement('div');
    body.className = 'bot-card-body';
    const sec = document.createElement('div');
    sec.className = 'card-section';
    const p = document.createElement('div');
    p.className = 'card-plain';
    p.textContent = text;
    sec.appendChild(p);
    body.appendChild(sec);
    wrap.appendChild(header);
    wrap.appendChild(body);
    card.appendChild(wrap);
    addCardActions(card, wrap, text, question);
    return card;
  }

  const wrap = document.createElement('div');
  wrap.className = 'bot-card';

  // Title = first text section
  const titleSec = sections.find(s => s.type === 'text');
  const header = document.createElement('div');
  header.className = 'bot-card-header';
  header.innerHTML = `<span class="bot-card-title">${titleSec ? titleSec.text.toUpperCase() : 'AI APITECH'}</span>`;
  wrap.appendChild(header);

  const body = document.createElement('div');
  body.className = 'bot-card-body';

  let isFirst = true;
  for (const sec of sections) {
    if (sec.type === 'text' && isFirst) { isFirst = false; continue; }
    const div = document.createElement('div');
    div.className = 'card-section';
    if (sec.type === 'kv') {
      const kv = document.createElement('div');
      kv.className = 'card-kv';
      sec.items.forEach((item, i) => {
        const row = document.createElement('div');
        row.className = 'card-row';
        const isResult = item.sep === '≈' || i === sec.items.length - 1;
        row.innerHTML = `<span class="card-key">${item.key}</span><span class="card-val${isResult ? ' highlight' : ''}">${item.sep} ${item.val}</span>`;
        kv.appendChild(row);
      });
      div.appendChild(kv);
    } else {
      const p = document.createElement('div');
      p.className = 'card-plain';
      p.textContent = sec.text;
      div.appendChild(p);
    }
    body.appendChild(div);
    isFirst = false;
  }

  wrap.appendChild(body);
  card.appendChild(wrap);
  addCardActions(card, wrap, text, question);
  return card;
}

function addCardActions(card, wrap, text, question) {
  const actions = document.createElement('div');
  actions.className = 'card-actions';

  const copyBtn = document.createElement('button');
  copyBtn.className = 'copy-btn';
  copyBtn.textContent = 'COPY';
  copyBtn.onclick = () => {
    navigator.clipboard.writeText(text);
    copyBtn.textContent = 'COPIED ✓';
    setTimeout(() => copyBtn.textContent = 'COPY', 2000);
  };

  const shareBtn = document.createElement('button');
  shareBtn.className = 'share-btn';
  shareBtn.textContent = 'SHARE';
  shareBtn.onclick = () => shareResult(text, question || '');

  actions.appendChild(copyBtn);
  actions.appendChild(shareBtn);
  wrap.appendChild(actions);
}

function addMessage(text, sender) {
  removeWelcome();
  msgCount++;

  if (sender === 'user') { lastUserMsg = text;
    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap user';
    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.textContent = `YOU · ${getTime()}`;
    const bubble = document.createElement('div');
    bubble.className = 'message';
    bubble.textContent = text;
    wrap.appendChild(meta);
    wrap.appendChild(bubble);
    chat.appendChild(wrap);
  } else {
    const card = buildCard(text, getTime(), lastUserMsg);
    chat.appendChild(card);
  }

  chat.scrollTop = chat.scrollHeight;
}

function addLoading() {
  removeWelcome();
  const wrap = document.createElement('div');
  wrap.className = 'loading-wrap';
  wrap.id = 'loading';
  wrap.innerHTML = `
    <div class="loading-bubble">
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
    </div>`;
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function removeLoading() {
  const el = document.getElementById('loading');
  if (el) el.remove();
}

async function sendMessage() {
  const message = input.value.trim();
  if (!message) return;

  addMessage(message, 'user');
  saveToHistory(message);
  input.value = '';
  updateCharCount(input);
  addLoading();

  try {
    const res = await fetch(webhookURL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message })
    });
    const data = await res.json();
    removeLoading();
    addMessage(data.reply ? data.reply.trim() : 'ไม่มีคำตอบจาก AI', 'bot');
  } catch (e) {
    removeLoading();
    addMessage('ไม่สามารถเชื่อมต่อกับ AI Server ได้\nกรุณาตรวจสอบการเชื่อมต่อและลองใหม่', 'bot');
  }
}

/* ── 6. VOICE INPUT (แก้ใหม่: fix iOS + abort ก่อน start ใหม่) ── */
let recognition = null;
let isListening = false;
let voiceTimeout = null;

const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;

function setVoiceUI(active) {
  const btn = document.getElementById('voiceBtn');
  const status = document.getElementById('voiceStatus');
  if (!btn || !status) return;
  if (active) {
    btn.classList.add('listening');
    status.classList.add('active');
    input.placeholder = '🎙 กำลังฟัง... (พูดได้เลย)';
  } else {
    btn.classList.remove('listening');
    status.classList.remove('active');
    input.placeholder = 'พิมพ์คำถามหรือค่าที่ต้องการคำนวณ...';
  }
}

function stopVoice() {
  isListening = false;
  setVoiceUI(false);
  clearTimeout(voiceTimeout);
  if (recognition) {
    try { recognition.abort(); } catch(e) {}
    recognition = null;
  }
}

function startVoice() {
  if (!SpeechRecognitionAPI) {
    alert('Voice Input ไม่รองรับในเบราว์เซอร์นี้\nกรุณาใช้ Chrome หรือ Edge บน Android/Desktop ครับ\n(Safari iOS ยังไม่รองรับ)');
    return;
  }

  stopVoice(); // abort ก่อนถ้ามี recognition ค้างอยู่

  const r = new SpeechRecognitionAPI();
  r.lang = 'th-TH';
  r.continuous = false;
  r.interimResults = true;
  r.maxAlternatives = 3;
  recognition = r;

  r.onstart = () => {
    isListening = true;
    setVoiceUI(true);
    // auto-stop หลัง 10 วินาที ป้องกันค้าง
    voiceTimeout = setTimeout(() => {
      if (isListening) { stopVoice(); }
    }, 10000);
  };

  r.onresult = (e) => {
    let interim = '';
    let final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t;
      else interim += t;
    }
    input.value = final || interim;
    updateCharCount(input);
  };

  r.onend = () => {
    const txt = input.value.trim();
    stopVoice();
    if (txt) {
      setTimeout(() => sendMessage(), 100);
    }
  };

  r.onerror = (e) => {
    stopVoice();
    const msgs = {
      'not-allowed': 'ไม่ได้รับอนุญาตใช้ไมโครโฟน\nกรุณากด Allow ในเบราว์เซอร์',
      'no-speech':   'ไม่ได้ยินเสียง ลองพูดใกล้ไมค์อีกครั้ง',
      'network':     'เชื่อมต่อ network ไม่ได้ ตรวจสอบอินเทอร์เน็ต',
      'aborted':     '',
    };
    const msg = msgs[e.error];
    if (msg) alert(msg);
  };

  try {
    r.start();
  } catch(e) {
    stopVoice();
    alert('เริ่ม Voice Input ไม่ได้: ' + e.message);
  }
}

function toggleVoice() {
  if (isListening) {
    stopVoice();
  } else {
    startVoice();
  }
}

/* ── 7. SHARE RESULT ────────────────────────────────────────────
   สร้างข้อความพร้อม emoji header / คำถาม / ผลลัพธ์
   copy ไป clipboard ด้วย navigator.clipboard.writeText
   แสดง toast "COPIED TO CLIPBOARD" 2 วินาที ── */
function shareResult(text, question) {
  const shareText = `🔧 AI API TECH T0.1\n\n📌 คำถาม: ${question}\n\n📊 ผลลัพธ์:\n${text}`;
  navigator.clipboard.writeText(shareText).then(() => {
    const toast = document.getElementById('shareToast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  });
}
</script>
<div class="share-toast" id="shareToast">COPIED TO CLIPBOARD</div>
